services:
  gatekeeper:
    build: .
    container_name: gatekeeper
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - gk-recordings:/app/recordings
      - gk-config:/app/configs
    environment:
      - GK_LISTEN=:8443
      - GK_HTTP_REDIRECT=:8080
      - GK_DB_DRIVER=sqlite
      - GK_DB_PATH=/app/gatekeeper.db
      # - GK_TLS_CERT=/app/configs/tls/server.crt
      # - GK_TLS_KEY=/app/configs/tls/server.key
      # - GK_ENCRYPTION_KEY=your-32-byte-hex-key
      # - GK_DEPLOYMENT_MODE=single

