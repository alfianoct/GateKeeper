<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateKeeper — Secure Access Gateway</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/views.css">
    <link rel="stylesheet" href="css/utilities.css">
    <!-- vendored xterm.js -->
    <link rel="stylesheet" href="vendor/xterm/xterm.min.css">
    <script src="vendor/xterm/xterm.min.js"></script>
    <script src="vendor/xterm/addon-fit.min.js"></script>
    <script src="vendor/xterm/addon-web-links.min.js"></script>
</head>
<body>

    <!-- auth screens (login/mfa/pw-change) get injected here by loader.js -->

    <!-- app shell -->
    <div class="app-shell" id="app-shell" style="display:none;">
    <div class="bg-grid"></div>

    <!-- sidebar — lives here because its always visible -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.25C17.25 23.15 21 18.25 21 13V7l-9-5z"/>
                    <rect x="9" y="10" width="6" height="7" rx="0.5"/>
                    <path d="M9 13h6"/>
                    <circle cx="12" cy="11.5" r="0.5"/>
                </svg>
                <span class="logo-text"><span class="logo-line-top">GATE</span><span class="logo-line-bottom">KEEPER</span></span>
            </div>
            <div class="sidebar-logo-sub">Secure Access Gateway</div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Navigation</div>
            <div class="nav-item active" data-view="hosts">
                <svg viewBox="0 0 24 24" width="20" height="20"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
                <span>Hosts</span>
                <span class="badge-count" id="nav-hosts-count">0</span>
            </div>
            <div class="nav-item" data-view="terminal">
                <svg viewBox="0 0 24 24" width="20" height="20"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                <span>Terminal</span>
            </div>
            <div class="nav-item" data-view="security">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                <span>Security</span>
            </div>

            <div id="admin-nav" style="display:none;">
                <div class="nav-section-label">Management</div>
                <div class="nav-item" data-view="dashboard">
                    <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="10" width="7" height="11"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-view="sessions">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Sessions</span>
                    <span class="badge-count" id="nav-sessions-count">0</span>
                </div>
                <div class="nav-item" data-view="audit">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    <span>Audit Log</span>
                </div>
                <div class="nav-item" data-view="access">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Access</span>
                </div>
                <div class="nav-item" data-view="settings">
                    <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>Settings</span>
                </div>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-footer-top">
                <div class="user-info">
                    <svg class="user-avatar-icon" viewBox="0 0 24 24" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <div>
                        <div class="user-name" id="user-name">loading...</div>
                        <div class="user-role" id="user-role">--</div>
                    </div>
                </div>
                <button class="btn btn-sm btn-logout" id="btn-logout" title="Sign Out">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
            <button class="sidebar-collapse-btn" id="btn-sidebar-collapse" title="Collapse sidebar">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
        </div>
    </aside>

    <!-- views land here -->
    <main class="main" id="main-views"></main>

    <!-- modals land here -->
    <div id="modal-mount"></div>

    </div><!-- end app-shell -->

    <!-- toasts -->
    <div class="toast-container" id="toast-container"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
