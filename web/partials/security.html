<!-- security -->
<section class="view" id="view-security">
    <div class="page-header">
        <div>
            <div class="page-title">Security</div>
            <div class="page-subtitle">Two-factor authentication &amp; password</div>
        </div>
    </div>

    <div class="card card-section mt-1">
        <div id="sec-top-row" class="sec-split">
            <div class="sec-panel">
                <h3 class="section-title section-title-sm">Two-Factor Authentication</h3>
                <div id="mfa-section-status">
                    <div class="table-loading"><span class="spinner"></span> Loading</div>
                </div>
            </div>
            <div id="password-change-card" class="sec-panel-right" style="display:none;">
                <h3 class="section-title section-title-sm">Change Password</h3>
                <div class="flex-row-end">
                    <div class="form-group form-group-inline">
                        <label class="form-label">Current</label>
                        <input class="form-input" type="password" id="sec-current-password" autocomplete="current-password">
                    </div>
                    <div class="form-group form-group-inline">
                        <label class="form-label">New</label>
                        <input class="form-input" type="password" id="sec-new-password" autocomplete="new-password">
                    </div>
                    <div class="form-group form-group-inline">
                        <label class="form-label">Confirm</label>
                        <input class="form-input" type="password" id="sec-confirm-password" autocomplete="new-password">
                    </div>
                    <button class="btn btn-primary btn-sm btn-h-input" id="btn-change-password">Update</button>
                </div>
                <div class="login-error" id="sec-password-error" style="margin-top:0.35rem;"></div>
            </div>
        </div>
    </div>
</section>
