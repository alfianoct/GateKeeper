<!-- access management -->
<section class="view" id="view-access">
    <div class="page-header">
        <div>
            <div class="page-title">Access</div>
            <div class="page-subtitle">Users, groups, and SSH keys</div>
        </div>
        <div class="flex-row">
            <button class="btn btn-sm btn-primary" id="access-btn-add-user" data-action="show-add-user">
                <svg viewBox="0 0 24 24" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add User
            </button>
            <button class="btn btn-sm btn-primary" id="access-btn-add-group" data-action="show-add-group" style="display:none;">
                <svg viewBox="0 0 24 24" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Group
            </button>
            <button class="btn btn-sm btn-primary" id="access-btn-add-key" data-action="show-add-key" style="display:none;">
                <svg viewBox="0 0 24 24" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Key
            </button>
        </div>
    </div>

    <div class="view-tabs" id="access-tabs">
        <button class="view-tab active" data-access-tab="users">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Users
            <span class="tab-badge" id="access-tab-users-count">0</span>
        </button>
        <button class="view-tab" data-access-tab="groups">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
            Groups
            <span class="tab-badge" id="access-tab-groups-count">0</span>
        </button>
        <button class="view-tab" data-access-tab="keys">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
            SSH Keys
            <span class="tab-badge" id="access-tab-keys-count">0</span>
        </button>
    </div>

    <div class="view-tab-pane active" id="access-pane-users">
        <div class="filter-bar">
            <input class="form-input filter-input" type="text" id="filter-users" placeholder="Search username, name, role...">
            <span class="filter-count" id="filter-users-count"></span>
        </div>
        <div class="card card-flush">
            <table class="sessions-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Display Name</th>
                        <th>Role</th>
                        <th>Groups</th>
                        <th>Provider</th>
                        <th>Last Login</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-body">
                    <tr><td colspan="8"><div class="table-loading"><span class="spinner"></span> Loading</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="view-tab-pane" id="access-pane-groups">
        <div class="card card-flush">
            <table class="sessions-table">
                <thead>
                    <tr>
                        <th>Group Name</th>
                        <th>Description</th>
                        <th>Permissions</th>
                        <th>Allowed Hosts</th>
                        <th>Max Sessions</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="groups-body">
                    <tr><td colspan="6"><div class="table-loading"><span class="spinner"></span> Loading</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="view-tab-pane" id="access-pane-keys">
        <div class="card card-flush">
            <table class="sessions-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Fingerprint</th>
                        <th>Added</th>
                        <th>Last Used</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ssh-keys-body">
                    <tr><td colspan="6"><div class="table-loading"><span class="spinner"></span> Loading</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
