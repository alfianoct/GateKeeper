<!-- dashboard -->
<section class="view" id="view-dashboard">
    <div class="page-header">
        <div>
            <div class="page-title">Dashboard</div>
            <div class="page-subtitle" id="dashboard-subtitle">System overview</div>
        </div>
        <button class="btn btn-sm" data-action="load-dashboard">
            <svg viewBox="0 0 24 24" width="14" height="14"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
        </button>
    </div>

    <div class="dash-metrics" id="dashboard-metrics">
        <div class="card dash-metric-card">
            <div class="dash-metric-icon" style="color:var(--accent-green);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
            </div>
            <div class="dash-metric-body">
                <div class="dash-metric-value" id="metric-hosts-online">â€”</div>
                <div class="dash-metric-label">Hosts online</div>
            </div>
        </div>
        <div class="card dash-metric-card">
            <div class="dash-metric-icon" style="color:var(--accent-cyan);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            </div>
            <div class="dash-metric-body">
                <div class="dash-metric-value" id="metric-sessions-active">â€”</div>
                <div class="dash-metric-label">Active sessions</div>
            </div>
        </div>
        <div class="card dash-metric-card">
            <div class="dash-metric-icon" style="color:var(--accent-green);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            </div>
            <div class="dash-metric-body">
                <div class="dash-metric-value" id="metric-users-active">â€”</div>
                <div class="dash-metric-label">Users active (24h)</div>
            </div>
        </div>
        <div class="card dash-metric-card">
            <div class="dash-metric-icon" style="color:var(--accent-green);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            </div>
            <div class="dash-metric-body">
                <div class="dash-metric-value" id="metric-logins-success">â€”</div>
                <div class="dash-metric-label">Logins (success)</div>
            </div>
        </div>
        <div class="card dash-metric-card">
            <div class="dash-metric-icon" style="color:var(--accent-red);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <div class="dash-metric-body">
                <div class="dash-metric-value" id="metric-logins-failed">â€”</div>
                <div class="dash-metric-label">Logins (failed)</div>
            </div>
        </div>
        <div class="card dash-metric-card">
            <div class="dash-metric-icon" style="color:var(--accent-cyan);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </div>
            <div class="dash-metric-body">
                <div class="dash-metric-value" id="metric-audit-events">â€”</div>
                <div class="dash-metric-label">Audit events</div>
            </div>
        </div>
    </div>

    <div class="dash-panels">
        <div class="card dash-panel dash-panel-activity">
            <div class="dash-panel-header">
                <span class="dash-panel-title">Recent Activity</span>
            </div>
            <div class="dash-activity-list" id="dash-activity-list">
                <div class="table-loading"><span class="spinner"></span> Loading activity</div>
            </div>
        </div>

        <div class="dash-panel-right">
            <div class="card dash-panel">
                <div class="dash-panel-header">
                    <span class="dash-panel-title">Active Sessions</span>
                    <button class="btn btn-sm btn-link-sm" data-view-link="sessions">View all</button>
                </div>
                <div id="dash-sessions-list">
                    <div class="table-loading"><span class="spinner"></span> Loading</div>
                </div>
            </div>

            <div class="card dash-panel">
                <div class="dash-panel-header">
                    <span class="dash-panel-title">System Health</span>
                </div>
                <div class="dash-health-grid" id="dash-health-grid">
                    <div class="dash-health-row">
                        <span class="dash-health-label">Deployment</span>
                        <span class="dash-health-value" id="health-deployment">â€”</span>
                    </div>
                    <div class="dash-health-row">
                        <span class="dash-health-label">Database</span>
                        <span class="dash-health-value" id="health-db">â€”</span>
                    </div>
                    <div class="dash-health-row">
                        <span class="dash-health-label">TLS</span>
                        <span class="dash-health-value" id="health-tls">â€”</span>
                    </div>
                    <div class="dash-health-row">
                        <span class="dash-health-label">Encryption</span>
                        <span class="dash-health-value" id="health-encryption">â€”</span>
                    </div>
                    <div class="dash-health-row">
                        <span class="dash-health-label">Uptime</span>
                        <span class="dash-health-value" id="health-uptime">â€”</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- instance footer -->
    <div class="dash-instance-footer" id="dash-instance-footer">
        <span id="dash-instance-id"></span>
        <span id="dashboard-updated-at"></span>
    </div>
</section>
