name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o gatekeeper-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            ./cmd/gatekeeper
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gatekeeper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gatekeeper-*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gatekeeper-*
          generate_release_notes: true
